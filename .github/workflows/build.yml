name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install system tools
      run: |
        apt-get update -qq
        apt-get install -y -qq wget unzip > /dev/null 2>&1
        which wget && which unzip

    - name: Install Android SDK
      run: |
        mkdir -p /opt/android-sdk/cmdline-tools
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdline.zip
        unzip -q /tmp/cmdline.zip -d /tmp/c
        cp -r /tmp/c/cmdline-tools /opt/android-sdk/cmdline-tools/latest
        yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Setup Gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        JAR=$(find /tmp/gradle-8.4 -name "gradle-wrapper*.jar" 2>/dev/null | head -1)
        if [ -n "$JAR" ]; then cp "$JAR" gradle/wrapper/gradle-wrapper.jar; fi
        ls -la gradle/wrapper/

    - name: Build APK
      env:
        ANDROID_HOME: /opt/android-sdk
        ANDROID_SDK_ROOT: /opt/android-sdk
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v5
      with:
        name: AutoClicker-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
